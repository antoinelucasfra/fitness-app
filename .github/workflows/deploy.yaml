name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  R_VERSION: "4.5.2"
  CONNECT_SERVER: https://connect.posit.cloud
  CONNECT_CONTENT_ID: 019c8665-051b-8cb9-da1b-d7af46a012ac

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore renv cache and library
        uses: r-lib/actions/setup-renv@v2

      - name: Install validation tools
        shell: Rscript {0}
        run: |
          install.packages("devtools")

      - name: Run package checks
        shell: Rscript {0}
        run: |
          devtools::check(
            args = c("--no-manual"),
            error_on = "error"
          )

  deploy:
    needs: validate
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://connect.posit.cloud/antoinelucasfra/content/019c8665-051b-8cb9-da1b-d7af46a012ac

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore renv cache and library
        uses: r-lib/actions/setup-renv@v2

      - name: Install deployment tools
        shell: Rscript {0}
        run: |
          install.packages("rsconnect")

      - name: Generate deployment manifest
        env:
          RENV_CONFIG_SNAPSHOT_VALIDATE: FALSE
        shell: Rscript {0}
        run: |
          rsconnect::writeManifest(
            appDir = ".",
            appFiles = c("R", "inst", "NAMESPACE", "DESCRIPTION", "app.R"),
            appPrimaryDoc = "app.R",
            appMode = "shiny"
          )

      - name: Publish to Posit Connect Cloud
        uses: rstudio/actions/connect-publish@main
        with:
          url: ${{ env.CONNECT_SERVER }}
          api-key: ${{ secrets.POSIT_CONNECT_API_KEY }}
          dir: .:${{ env.CONNECT_CONTENT_ID }}
          show-logs: true
